name: PR Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"
      run_tests: true

  pr-comment:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Print PR summary
        run: echo "PR checks passed for branch ${{ github.head_ref }}"

    sonar-scan:
    needs: build-test
    uses: ./.github/workflows/sonar-scan.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pr-comment:
    needs:
      - build-test
      - sonar-scan
    runs-on: ubuntu-latest
    steps:
      - name: Print PR summary
        run: echo "PR checks passed for branch ${{ github.head_ref }}"